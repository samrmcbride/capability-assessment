<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Capability Assessment</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #4a5568;
      --color-text-tertiary: #8795a1;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f8fa;
      --color-background-tertiary: #edf0f4;
      --color-border-tertiary: #dce1e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      display: flex;
      justify-content: center;
      padding: 24px 12px 40px;
      min-height: 100vh;
    }
    #root { width: 100%; max-width: 820px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const PHASES = [
  { id: "strategy", label: "Strategy", color: "#B85042" },
  { id: "finance", label: "Finance", color: "#C46A3E" },
  { id: "plan", label: "Plan", color: "#D4883A" },
  { id: "build", label: "Build", color: "#3D7A5F" },
  { id: "operate", label: "Operate", color: "#2D6A7A" },
  { id: "dispose", label: "Dispose", color: "#4A5568" },
];

const SCALE_COLOR = "#3D7A5F";
const ENHANCE_COLOR = "#C46A3E";
const EVALUATE_COLOR = "#888";

const PERSONAS = [
  {
    id: "cfo",
    label: "CFO / Treasurer",
    color: "#B85042",
    description: "Capital allocation, financing, business case, financial reporting",
    capabilities: new Set([
      "Capital strategy & portfolio planning",
      "Business case & feasibility",
      "Investment prioritization",
      "Post investment review",
      "Entity & investor structuring",
      "Tax optimization & transfer pricing",
      "Equity raise & lead advisory",
      "Debt raise & capital markets",
      "Financial due diligence",
      "Valuation",
      "Market entry & structuring",
      "Post-deal integration",
      "Governance & setup",
      "Financial reporting & accounting",
      "Internal audit & benchmarking",
    ]),
  },
  {
    id: "tax",
    label: "Tax director",
    color: "#C46A3E",
    description: "Credits, incentives, structuring, transfer pricing, compliance",
    capabilities: new Set([
      "Tax credits & incentives",
      "Grants, abatements & exemptions",
      "Entity & investor structuring",
      "Tax optimization & transfer pricing",
      "Cost segregation analysis",
      "Customs & trade planning",
      "Tax due diligence",
      "Sustainability, ESG & carbon reporting",
      "Credit substantiation & audit readiness",
      "Customs & trade compliance",
      "Site selection",
      "Business case & feasibility",
    ]),
  },
  {
    id: "capex",
    label: "Head of capital projects",
    color: "#3D7A5F",
    description: "Program delivery, controls, procurement, governance",
    capabilities: new Set([
      "Program & project management",
      "Cost management & controls",
      "Schedule & risk management",
      "Procurement strategy",
      "Commercial management",
      "Supply chain execution",
      "Construction oversight",
      "Commissioning & handover",
      "Design management",
      "Technical advisory",
      "Lender & investor technical advisory",
      "Governance & setup",
      "Regulatory & governance compliance",
      "Risk management framework",
      "Change management",
      "Workforce strategy & capability building",
      "Digital program enablement",
      "Advanced analytics",
      "Operational readiness planning",
    ]),
  },
  {
    id: "coo",
    label: "COO / VP operations",
    color: "#4A5568",
    description: "Asset performance, energy, compliance, resilience",
    capabilities: new Set([
      "Operational readiness planning",
      "Asset management strategy",
      "Energy management, efficiency & resilience",
      "Financial reporting & accounting",
      "Internal audit & benchmarking",
      "Credit substantiation & audit readiness",
      "Customs & trade compliance",
      "Climate risk modeling",
      "Cybersecurity & crisis response",
      "Facility operate, maintain & retire",
      "Decommissioning & disposal",
      "Operational turnaround & restructuring",
      "Commissioning & handover",
      "Sustainability, ESG & carbon reporting",
      "Health & safety advisory",
    ]),
  },
  {
    id: "cdo",
    label: "Chief development officer",
    color: "#D4883A",
    description: "Site selection, JV structuring, due diligence, M&A",
    capabilities: new Set([
      "Capital strategy & portfolio planning",
      "Business case & feasibility",
      "Site selection",
      "Investment prioritization",
      "Joint ventures & partnerships",
      "Entity & investor structuring",
      "Equity raise & lead advisory",
      "Debt raise & capital markets",
      "Financial due diligence",
      "Tax due diligence",
      "Commercial due diligence",
      "Technical due diligence",
      "Valuation",
      "Market entry & structuring",
      "Post-deal integration",
      "Stakeholder management",
      "Regulatory strategy",
    ]),
  },
  {
    id: "cio",
    label: "CIO / CTO",
    color: "#2D6A7A",
    description: "Digital enablement, analytics, ERP, automation",
    capabilities: new Set([
      "Digital program enablement",
      "Advanced analytics",
      "BIM / digital twin",
      "ERP integration",
      "Process automation & orchestration",
      "Data governance & reporting",
    ]),
  },
];

const CATEGORIES = [
  {
    id: "investment",
    num: "01",
    title: "Capital & investment strategy",
    accent: "#B85042",
    items: [
      { name: "Capital strategy & portfolio planning", start: 0, end: 1, status: "scale" },
      { name: "Business case & feasibility", start: 0, end: 2, status: "scale" },
      { name: "Site selection", start: 0, end: 2, status: "scale" },
      { name: "Investment prioritization", start: 0, end: 1, status: "enhance" },
      { name: "Post investment review", start: 4, end: 5, status: "scale" },
    ],
  },
  {
    id: "structuring",
    num: "02",
    title: "Structuring, tax & incentives",
    accent: "#C46A3E",
    items: [
      { name: "Tax credits & incentives", start: 0, end: 5, status: "scale" },
      { name: "Grants, abatements & exemptions", start: 0, end: 5, status: "scale" },
      { name: "Joint ventures & partnerships", start: 0, end: 3, status: "enhance" },
      { name: "Entity & investor structuring", start: 0, end: 1, status: "scale" },
      { name: "Tax optimization & transfer pricing", start: 1, end: 4, status: "scale" },
      { name: "Cost segregation analysis", start: 2, end: 3, status: "scale" },
      { name: "Customs & trade planning", start: 0, end: 2, status: "enhance" },
    ],
  },
  {
    id: "financing",
    num: "03",
    title: "Financing & transactions",
    accent: "#D4883A",
    items: [
      { name: "Equity raise & lead advisory", start: 0, end: 1, status: "scale" },
      { name: "Debt raise & capital markets", start: 1, end: 2, status: "scale" },
      { name: "Financial due diligence", start: 1, end: 1, status: "scale" },
      { name: "Tax due diligence", start: 1, end: 1, status: "scale" },
      { name: "Commercial due diligence", start: 1, end: 1, status: "scale" },
      { name: "Technical due diligence", start: 1, end: 2, status: "evaluate" },
      { name: "Valuation", start: 0, end: 1, status: "scale" },
      { name: "Market entry & structuring", start: 0, end: 1, status: "scale" },
      { name: "Post-deal integration", start: 1, end: 2, status: "enhance" },
    ],
  },
  {
    id: "governance",
    num: "04",
    title: "Governance, risk & compliance",
    accent: "#5A7A3D",
    items: [
      { name: "Governance & setup", start: 0, end: 3, status: "scale" },
      { name: "Regulatory strategy", start: 2, end: 3, status: "enhance" },
      { name: "Regulatory & governance compliance", start: 2, end: 5, status: "scale" },
      { name: "Stakeholder management", start: 2, end: 4, status: "enhance" },
      { name: "Organizational design", start: 2, end: 3, status: "scale" },
      { name: "Change management", start: 2, end: 3, status: "scale" },
      { name: "Sustainability, ESG & carbon reporting", start: 0, end: 5, status: "scale" },
      { name: "Workforce strategy & capability building", start: 2, end: 4, status: "enhance" },
      { name: "Health & safety advisory", start: 2, end: 4, status: "evaluate" },
      { name: "Risk management framework", start: 2, end: 4, status: "scale" },
    ],
  },
  {
    id: "delivery",
    num: "05",
    title: "Program delivery & controls",
    accent: "#3D7A5F",
    items: [
      { name: "Program & project management", start: 2, end: 3, status: "scale" },
      { name: "Cost management & controls", start: 2, end: 3, status: "scale" },
      { name: "Schedule & risk management", start: 2, end: 3, status: "scale" },
      { name: "Procurement strategy", start: 2, end: 3, status: "enhance" },
      { name: "Commercial management", start: 2, end: 4, status: "enhance" },
      { name: "Supply chain execution", start: 2, end: 4, status: "enhance" },
      { name: "Construction oversight", start: 3, end: 3, status: "evaluate" },
      { name: "Commissioning & handover", start: 3, end: 4, status: "evaluate" },
      { name: "Design management", start: 2, end: 3, status: "evaluate" },
      { name: "Technical advisory", start: 2, end: 3, status: "evaluate" },
      { name: "Lender & investor technical advisory", start: 1, end: 3, status: "scale" },
    ],
  },
  {
    id: "technology",
    num: "06",
    title: "Technology & data",
    accent: "#2D6A7A",
    items: [
      { name: "Digital program enablement", start: 1, end: 4, status: "scale" },
      { name: "Advanced analytics", start: 2, end: 4, status: "scale" },
      { name: "BIM / digital twin", start: 2, end: 4, status: "evaluate" },
      { name: "ERP integration", start: 2, end: 4, status: "enhance" },
      { name: "Process automation & orchestration", start: 2, end: 4, status: "enhance" },
      { name: "Data governance & reporting", start: 2, end: 4, status: "scale" },
    ],
  },
  {
    id: "operations",
    num: "07",
    title: "Operations & asset optimization",
    accent: "#4A5568",
    items: [
      { name: "Operational readiness planning", start: 3, end: 4, status: "scale" },
      { name: "Asset management strategy", start: 4, end: 5, status: "scale" },
      { name: "Energy management, efficiency & resilience", start: 4, end: 4, status: "scale" },
      { name: "Financial reporting & accounting", start: 4, end: 4, status: "scale" },
      { name: "Internal audit & benchmarking", start: 4, end: 4, status: "scale" },
      { name: "Credit substantiation & audit readiness", start: 4, end: 5, status: "scale" },
      { name: "Customs & trade compliance", start: 4, end: 5, status: "enhance" },
      { name: "Climate risk modeling", start: 4, end: 5, status: "enhance" },
      { name: "Cybersecurity & crisis response", start: 4, end: 4, status: "enhance" },
      { name: "Facility operate, maintain & retire", start: 4, end: 5, status: "scale" },
      { name: "Decommissioning & disposal", start: 5, end: 5, status: "scale" },
      { name: "Operational turnaround & restructuring", start: 4, end: 5, status: "enhance" },
    ],
  },
];

function PhaseBar({ item, dimmed }) {
  const color = item.status === "scale" ? SCALE_COLOR : item.status === "enhance" ? ENHANCE_COLOR : EVALUATE_COLOR;
  const isDashed = item.status === "evaluate";
  return (
    <div style={{ display: "flex", gap: 1, flex: 1, transition: "opacity 0.3s", opacity: dimmed ? 0.15 : 1 }}>
      {PHASES.map((_, i) => {
        const active = i >= item.start && i <= item.end;
        const isStart = i === item.start;
        const isEnd = i === item.end;
        return (
          <div key={i} style={{ flex: 1, display: "flex", alignItems: "center", height: 10 }}>
            {active ? (
              <div style={{
                width: "100%", height: isDashed ? 3 : 5,
                backgroundColor: isDashed ? "transparent" : color,
                borderTop: isDashed ? `2px dashed ${color}` : "none",
                borderRadius: `${isStart ? 3 : 0}px ${isEnd ? 3 : 0}px ${isEnd ? 3 : 0}px ${isStart ? 3 : 0}px`,
                opacity: 0.8, position: "relative",
              }}>
                {isStart && <div style={{ position: "absolute", left: -1, top: isDashed ? -4 : -1, width: 7, height: 7, borderRadius: 1, backgroundColor: color, opacity: 0.9 }} />}
                {isEnd && <div style={{ position: "absolute", right: -1, top: isDashed ? -4 : -1, width: 7, height: 7, borderRadius: 1, backgroundColor: color, opacity: 0.9 }} />}
              </div>
            ) : (
              <div style={{ width: "100%", height: 1, backgroundColor: "var(--color-border-tertiary)", opacity: 0.3 }} />
            )}
          </div>
        );
      })}
    </div>
  );
}

function CategoryRow({ category, isExpanded, onToggle, activePersona }) {
  const persona = activePersona ? PERSONAS.find((p) => p.id === activePersona) : null;
  const hasAnyMatch = persona ? category.items.some((it) => persona.capabilities.has(it.name)) : true;
  const matchCount = persona ? category.items.filter((it) => persona.capabilities.has(it.name)).length : 0;

  return (
    <div style={{
      borderBottom: "1px solid var(--color-border-tertiary)",
      backgroundColor: isExpanded ? `${category.accent}06` : "transparent",
      transition: "background-color 0.25s, opacity 0.3s",
      opacity: persona && !hasAnyMatch ? 0.3 : 1,
    }}>
      <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer", userSelect: "none" }}
        onMouseEnter={(e) => { if (!isExpanded) e.currentTarget.style.backgroundColor = `${category.accent}08`; }}
        onMouseLeave={(e) => { if (!isExpanded) e.currentTarget.style.backgroundColor = "transparent"; }}>
        <span style={{ fontFamily: "Georgia, serif", fontSize: 11, color: category.accent, opacity: 0.6, minWidth: 18, textAlign: "right" }}>{category.num}</span>
        <div style={{ width: 200, minWidth: 200, display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 12.5, fontWeight: 500, color: "var(--color-text-primary)", lineHeight: 1.3 }}>{category.title}</span>
          {persona && hasAnyMatch && (
            <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 3, backgroundColor: `${persona.color}15`, color: persona.color, fontWeight: 500, whiteSpace: "nowrap", flexShrink: 0 }}>
              {matchCount}
            </span>
          )}
        </div>
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {PHASES.map((_, i) => {
            const relevantItems = persona ? category.items.filter((it) => persona.capabilities.has(it.name)) : category.items;
            const hasScale = relevantItems.some((it) => it.status === "scale" && i >= it.start && i <= it.end);
            const hasEnhance = relevantItems.some((it) => it.status === "enhance" && i >= it.start && i <= it.end);
            const hasEval = relevantItems.some((it) => it.status === "evaluate" && i >= it.start && i <= it.end);
            const active = hasScale || hasEnhance || hasEval;
            const c = hasScale ? SCALE_COLOR : hasEnhance ? ENHANCE_COLOR : EVALUATE_COLOR;
            return <div key={i} style={{ flex: 1, height: 8, borderRadius: 2, backgroundColor: active ? c : "var(--color-background-tertiary)", opacity: active ? 0.55 : 0.2, transition: "all 0.3s" }} />;
          })}
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s", flexShrink: 0, opacity: 0.35 }}>
          <path d="M3.5 5.5L7 9L10.5 5.5" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <div style={{ maxHeight: isExpanded ? category.items.length * 32 + 16 : 0, overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 12px 10px" }}>
          {category.items.map((item, i) => {
            const dimmed = persona && !persona.capabilities.has(item.name);
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "3px 0", transition: "opacity 0.3s" }}>
                <span style={{ minWidth: 18 }} />
                <div style={{ width: 200, minWidth: 200, fontSize: 11.5, color: "var(--color-text-primary)", lineHeight: 1.3, transition: "opacity 0.3s", opacity: dimmed ? 0.2 : 1 }}>
                  {item.name}
                </div>
                <PhaseBar item={item} dimmed={dimmed} />
                <span style={{ width: 14, flexShrink: 0 }} />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function CapabilityAssessment() {
  const [expanded, setExpanded] = useState(null);
  const [allExpanded, setAllExpanded] = useState(false);
  const [activePersona, setActivePersona] = useState(null);

  const toggle = (id) => { if (allExpanded) return; setExpanded(expanded === id ? null : id); };
  const toggleAll = () => { setAllExpanded(!allExpanded); if (!allExpanded) setExpanded(null); };
  const selectPersona = (id) => { setActivePersona(activePersona === id ? null : id); };

  const activeP = activePersona ? PERSONAS.find((p) => p.id === activePersona) : null;

  return (
    <div style={{ padding: "4px 0", maxWidth: 780, margin: "0 auto" }}>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 19, fontWeight: 500, color: "var(--color-text-primary)", lineHeight: 1.3 }}>
          One infrastructure capability assessment
        </div>
        <div style={{ fontSize: 12.5, color: "var(--color-text-tertiary)", marginTop: 3 }}>
          Owner perspective &middot; Strategy &rarr; Dispose lifecycle
        </div>
      </div>

      {/* persona selector */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 500, color: "var(--color-text-tertiary)", textTransform: "uppercase", letterSpacing: "0.4px", marginBottom: 6 }}>
          Filter by role
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {PERSONAS.map((p) => {
            const isActive = activePersona === p.id;
            return (
              <button
                key={p.id}
                onClick={() => selectPersona(p.id)}
                style={{
                  display: "flex", flexDirection: "column", alignItems: "flex-start",
                  padding: "8px 12px", borderRadius: 8,
                  border: isActive ? `1.5px solid ${p.color}` : "1px solid var(--color-border-tertiary)",
                  background: isActive ? `${p.color}10` : "var(--color-background-primary)",
                  cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
                  flex: "1 1 calc(33.33% - 6px)", minWidth: 160,
                }}
              >
                <span style={{ fontSize: 12.5, fontWeight: 500, color: isActive ? p.color : "var(--color-text-primary)", transition: "color 0.2s" }}>
                  {p.label}
                </span>
                <span style={{ fontSize: 10.5, color: "var(--color-text-tertiary)", lineHeight: 1.3, marginTop: 2, textAlign: "left" }}>
                  {p.description}
                </span>
              </button>
            );
          })}
        </div>
        {activeP && (
          <div style={{ marginTop: 8, fontSize: 11.5, color: activeP.color, fontWeight: 500 }}>
            Showing {activeP.capabilities.size} capabilities relevant to {activeP.label}
          </div>
        )}
      </div>

      {/* phase header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2, padding: "0 12px" }}>
        <span style={{ minWidth: 18 }} />
        <div style={{ width: 200, minWidth: 200 }} />
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {PHASES.map((phase, i) => (
            <div key={phase.id} style={{ flex: 1, textAlign: "center", padding: "7px 0", backgroundColor: phase.color, color: "#fff", fontSize: 11, fontWeight: 500, borderRadius: i === 0 ? "4px 0 0 4px" : i === PHASES.length - 1 ? "0 4px 4px 0" : 0, letterSpacing: "0.2px" }}>{phase.label}</div>
          ))}
        </div>
        <span style={{ width: 14 }} />
      </div>

      {/* legend + expand */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 12px", borderBottom: "1px solid var(--color-border-tertiary)" }}>
        <div style={{ display: "flex", gap: 14, fontSize: 10.5, color: "var(--color-text-tertiary)", alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 4, borderRadius: 2, backgroundColor: SCALE_COLOR, opacity: 0.7, display: "inline-block" }} />Scale</span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 4, borderRadius: 2, backgroundColor: ENHANCE_COLOR, opacity: 0.7, display: "inline-block" }} />Enhance / scale</span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 14, height: 2, borderTop: `2px dashed ${EVALUATE_COLOR}`, display: "inline-block" }} />Evaluate</span>
        </div>
        <button onClick={toggleAll} style={{ fontSize: 10.5, color: "var(--color-text-secondary)", background: "none", border: "1px solid var(--color-border-tertiary)", borderRadius: 5, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>{allExpanded ? "Collapse all" : "Expand all"}</button>
      </div>

      {/* rows */}
      <div style={{ border: "1px solid var(--color-border-tertiary)", borderTop: "none", borderRadius: "0 0 8px 8px", overflow: "hidden" }}>
        {CATEGORIES.map((cat) => (
          <CategoryRow key={cat.id} category={cat} isExpanded={allExpanded || expanded === cat.id} onToggle={() => toggle(cat.id)} activePersona={activePersona} />
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CapabilityAssessment />);
  </script>
</body>
</html>
