<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Capability Assessment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #F5F7F8;
      color: #000;
      display: flex;
      justify-content: center;
      padding: 24px 12px 40px;
      min-height: 100vh;
    }
    #root { width: 100%; max-width: 820px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useCallback, useRef } = React;

const PWC = {
  orange: "#FD5108", orange400: "#FE7C39", orange300: "#FFAA72",
  orange200: "#FFCDA8", orange100: "#FFE8D4", orange50: "#FFF5ED",
  black: "#000000", white: "#FFFFFF",
  grey500: "#A1A8B3", grey400: "#B5BCC4", grey300: "#CBD1D6",
  grey200: "#DFE3E6", grey100: "#EEEFF1", grey50: "#F5F7F8",
};

const PHASES = [
  { id: "strategy", label: "Strategy" }, { id: "finance", label: "Finance" },
  { id: "plan", label: "Plan" }, { id: "build", label: "Build" },
  { id: "operate", label: "Operate" }, { id: "dispose", label: "Dispose" },
];

const BAR_COLOR = PWC.black;

const PERSONAS = [
  { id: "cfo", label: "CFO / Treasurer", description: "Capital allocation, financing, business case, financial reporting",
    capabilities: new Set(["Capital strategy & portfolio planning","Business case & feasibility","Investment prioritization","Post investment review","Entity & investor structuring","Tax optimization & transfer pricing","Equity raise & lead advisory","Debt raise & capital markets","Financial due diligence","Valuation","Market entry & structuring","Post-deal integration","Governance & setup","Financial reporting & accounting","Internal audit & benchmarking"]) },
  { id: "tax", label: "Tax director", description: "Credits, incentives, structuring, transfer pricing, compliance",
    capabilities: new Set(["Tax credits & incentives","Grants, abatements & exemptions","Entity & investor structuring","Tax optimization & transfer pricing","Cost segregation analysis","Customs & trade planning","Tax due diligence","Sustainability, ESG & carbon reporting","Credit substantiation & audit readiness","Customs & trade compliance","Site selection","Business case & feasibility"]) },
  { id: "capex", label: "Head of capital projects", description: "Program delivery, controls, procurement, governance",
    capabilities: new Set(["Program & project management","Cost management & controls","Schedule & risk management","Procurement strategy","Commercial management","Supply chain execution","Construction oversight","Commissioning & handover","Design management","Technical advisory","Lender & investor technical advisory","Governance & setup","Regulatory & governance compliance","Risk management framework","Change management","Workforce strategy & capability building","Digital program enablement","Advanced analytics","Operational readiness planning"]) },
  { id: "coo", label: "COO / VP operations", description: "Asset performance, energy, compliance, resilience",
    capabilities: new Set(["Operational readiness planning","Asset management strategy","Energy management, efficiency & resilience","Financial reporting & accounting","Internal audit & benchmarking","Credit substantiation & audit readiness","Customs & trade compliance","Climate risk modeling","Cybersecurity & crisis response","Facility operate, maintain & retire","Decommissioning & disposal","Operational turnaround & restructuring","Commissioning & handover","Sustainability, ESG & carbon reporting","Health & safety advisory"]) },
  { id: "cdo", label: "Chief development officer", description: "Site selection, JV structuring, due diligence, M&A",
    capabilities: new Set(["Capital strategy & portfolio planning","Business case & feasibility","Site selection","Investment prioritization","Joint ventures & partnerships","Entity & investor structuring","Equity raise & lead advisory","Debt raise & capital markets","Financial due diligence","Tax due diligence","Commercial due diligence","Technical due diligence","Valuation","Market entry & structuring","Post-deal integration","Stakeholder management","Regulatory strategy"]) },
  { id: "cio", label: "CIO / CTO", description: "Digital enablement, analytics, ERP, automation",
    capabilities: new Set(["Digital program enablement","Advanced analytics","BIM / digital twin","ERP integration","Process automation & orchestration","Data governance & reporting"]) },
];

const CATEGORIES = [
  { id: "investment", num: "01", title: "Capital & investment strategy", items: [
    { name: "Capital strategy & portfolio planning", start: 0, end: 1, q: ["Do we have a clear view of our total capital portfolio and where each asset sits in its lifecycle?", "Are we allocating capital to the highest-return opportunities or just funding the loudest voices?"] },
    { name: "Business case & feasibility", start: 0, end: 2, q: ["Are our assumptions stress-tested \u2014 what happens if costs overrun 20% or demand shifts?", "Who owns the business case after approval, and how often do we revisit it against actuals?"] },
    { name: "Site selection", start: 0, end: 2, q: ["Are we evaluating sites against the full cost stack \u2014 land, power, labor, tax, permitting, resilience?", "How does our site strategy align with our long-term energy and sustainability commitments?"] },
    { name: "Investment prioritization", start: 0, end: 1, q: ["When we have more opportunities than capital, what\u2019s the decision framework?", "Are we comparing projects on a consistent, risk-adjusted basis across the portfolio?"] },
    { name: "Post investment review", start: 4, end: 5, q: ["After major investments, are we systematically capturing what worked and what didn\u2019t?", "Are lessons from past projects actually feeding into the next business case?"] },
  ]},
  { id: "structuring", num: "02", title: "Structuring, tax & incentives", items: [
    { name: "Tax credits & incentives", start: 0, end: 5, q: ["Are we identifying every eligible credit at federal, state, and local levels before breaking ground?", "Are we structured to actually capture and monetize the credits we\u2019re eligible for?"] },
    { name: "Grants, abatements & exemptions", start: 0, end: 5, q: ["Have we modeled the full incentive value over the asset\u2019s life, including clawback risk?", "Are we negotiating the best possible terms, or accepting standard packages?"] },
    { name: "Joint ventures & partnerships", start: 0, end: 3, q: ["Is our JV structure optimized for each partner\u2019s tax position and risk appetite?", "Who bears the downside if the partnership underperforms, and is that fair?"] },
    { name: "Entity & investor structuring", start: 0, end: 1, q: ["Is our entity structure fit for purpose across all jurisdictions, or carrying legacy complexity?", "Can our current structure flex to accommodate different investor types without restructuring?"] },
    { name: "Tax optimization & transfer pricing", start: 1, end: 4, q: ["Are our intercompany arrangements defensible under audit?", "Are we proactively managing transfer pricing as the business evolves, or waiting for a challenge?"] },
    { name: "Cost segregation analysis", start: 2, end: 3, q: ["Have we done a cost segregation study on recent builds to accelerate depreciation?", "Are we leaving cash flow on the table by using default asset classifications?"] },
    { name: "Customs & trade planning", start: 0, end: 2, q: ["Are we factoring tariff exposure and trade policy volatility into procurement decisions?", "Have we evaluated foreign trade zone benefits for our key sites?"] },
  ]},
  { id: "financing", num: "03", title: "Financing & transactions", items: [
    { name: "Equity raise & lead advisory", start: 0, end: 1, q: ["Are we accessing the broadest set of capital sources with the right equity story?", "Is our capital structure optimized for this phase of growth, or are we over- or under-equitized?"] },
    { name: "Debt raise & capital markets", start: 1, end: 2, q: ["Are our financing terms competitive, and have we stress-tested debt capacity under downside scenarios?", "Do we have covenant headroom for the next 2\u20133 years under realistic assumptions?"] },
    { name: "Financial due diligence", start: 1, end: 1, q: ["Do we have full visibility into the financial health of what we\u2019re acquiring?", "Are the seller\u2019s projections grounded in contractual reality, or built on optimistic assumptions?"] },
    { name: "Tax due diligence", start: 1, end: 1, q: ["Are there historical tax positions in the target that could create exposure post-close?", "Are we capturing the full tax synergies available in this deal structure?"] },
    { name: "Commercial due diligence", start: 1, end: 1, q: ["Is the market thesis behind this investment sound and independently validated?", "Are demand projections based on contracts, letters of intent, or just management forecasts?"] },
    { name: "Technical due diligence", start: 1, end: 2, q: ["What\u2019s the true condition of the asset \u2014 are there deferred maintenance or capacity constraints?", "What\u2019s the real CapEx needed to bring this asset to our operating standard?"] },
    { name: "Valuation", start: 0, end: 1, q: ["Is our valuation methodology appropriate and defensible to stakeholders?", "Are we paying a fair price, or are competitive dynamics inflating the bid?"] },
    { name: "Market entry & structuring", start: 0, end: 1, q: ["Are we entering this market with the right vehicle and at the right time?", "What\u2019s our competitive advantage versus incumbents, and is it sustainable?"] },
    { name: "Post-deal integration", start: 1, end: 2, q: ["Do we have a 100-day integration plan that protects value from day one?", "Who is accountable for realizing the synergies we underwrote in the business case?"] },
  ]},
  { id: "governance", num: "04", title: "Governance, risk & compliance", items: [
    { name: "Governance & setup", start: 0, end: 3, q: ["Do we have the right governance structure to make decisions at the speed this program requires?", "Are decision rights clear, or do things stall in committee?"] },
    { name: "Regulatory strategy", start: 2, end: 3, q: ["Are we ahead of the regulatory curve, or purely reactive?", "Which upcoming regulations could fundamentally change our project economics?"] },
    { name: "Regulatory & governance compliance", start: 2, end: 5, q: ["Are we confident we\u2019d pass a regulatory audit today?", "Where are the compliance blind spots we haven\u2019t stress-tested?"] },
    { name: "Stakeholder management", start: 2, end: 4, q: ["Have we mapped all stakeholders with a strategy for each?", "Where could opposition derail the project, and do we have a mitigation plan?"] },
    { name: "Organizational design", start: 2, end: 3, q: ["Is our organization designed around the work that needs to happen, or around legacy structures?", "Do we have the right spans of control and decision authority for execution speed?"] },
    { name: "Change management", start: 2, end: 3, q: ["Are the people who need to change actually bought in, or just compliant on paper?", "What\u2019s our plan when resistance surfaces \u2014 do we have early warning indicators?"] },
    { name: "Sustainability, ESG & carbon reporting", start: 0, end: 5, q: ["Can we substantiate our ESG commitments with data, or are they still aspirational?", "Are we prepared for the reporting requirements coming in the next 2\u20133 years?"] },
    { name: "Workforce strategy & capability building", start: 2, end: 4, q: ["Can we actually staff this program with the talent we need, in the markets we need it?", "Are we building long-term capability, or just filling seats to hit a milestone?"] },
    { name: "Health & safety advisory", start: 2, end: 4, q: ["Are our safety systems designed for the specific risks of this project?", "Where are we most exposed, and are our leading indicators actually leading?"] },
    { name: "Risk management framework", start: 2, end: 4, q: ["Do we have a risk register that\u2019s actually used for decisions, or is it a compliance artifact?", "What\u2019s the risk we\u2019re not talking about \u2014 the one that could change everything?"] },
  ]},
  { id: "delivery", num: "05", title: "Program delivery & controls", items: [
    { name: "Program & project management", start: 2, end: 3, q: ["Is our PMO set up to deliver, or is it just a reporting layer?", "Do project managers have the authority to make the calls they need to make?"] },
    { name: "Cost management & controls", start: 2, end: 3, q: ["Do we know our true cost position right now \u2014 not last month\u2019s?", "Where are the biggest variances trending, and what\u2019s the corrective action plan?"] },
    { name: "Schedule & risk management", start: 2, end: 3, q: ["Are we managing schedule proactively, or just reporting delays after they happen?", "What\u2019s on the critical path today, and what would it take to recover if it slips?"] },
    { name: "Procurement strategy", start: 2, end: 3, q: ["Are we getting the best value from our supply chain, or locked into suboptimal contracts?", "Are we single-sourced on anything critical, and what\u2019s our contingency?"] },
    { name: "Commercial management", start: 2, end: 4, q: ["Are our contracts actually protecting us in the ways that matter?", "When was the last time we assessed our claims exposure across the program?"] },
    { name: "Supply chain execution", start: 2, end: 4, q: ["Do we have visibility into Tier 2 and Tier 3 suppliers?", "What happens if a key supplier fails \u2014 do we have a tested backup plan?"] },
    { name: "Construction oversight", start: 3, end: 3, q: ["Are we confident the work in the field matches the design intent and quality spec?", "Who is independently verifying quality, and are they truly independent?"] },
    { name: "Commissioning & handover", start: 3, end: 4, q: ["Do we have a clear, agreed definition of \u2018done\u2019 that operations has signed off on?", "Is operations ready to take over on day one, or will there be a capability gap?"] },
    { name: "Design management", start: 2, end: 3, q: ["Are design decisions being made with the full cost-of-ownership in mind?", "Are we designing for constructability and operability, not just performance on paper?"] },
    { name: "Technical advisory", start: 2, end: 3, q: ["Do we have the right independent technical perspective, or are we relying entirely on the contractor?", "Are our technical advisors asking hard questions, or confirming what we want to hear?"] },
    { name: "Lender & investor technical advisory", start: 1, end: 3, q: ["Are our lenders and investors getting the independent assurance they need?", "Is there a gap between what we\u2019re reporting and what they need to see?"] },
  ]},
  { id: "technology", num: "06", title: "Technology & data", items: [
    { name: "Digital program enablement", start: 1, end: 4, q: ["Are our digital tools helping people do their jobs better, or just adding reporting overhead?", "Are we getting value from what we\u2019ve already deployed before investing in the next platform?"] },
    { name: "Advanced analytics", start: 2, end: 4, q: ["Are we using data to predict problems, or just documenting them after the fact?", "What decisions would we make differently if we had better data today?"] },
    { name: "BIM / digital twin", start: 2, end: 4, q: ["Is our digital twin maintained and used for operations, or did it stop being useful after construction?", "What\u2019s the ROI case for maintaining it through the asset lifecycle?"] },
    { name: "ERP integration", start: 2, end: 4, q: ["Can our systems talk to each other, or are people manually bridging gaps with spreadsheets?", "Where is integration friction costing us the most time and accuracy?"] },
    { name: "Process automation & orchestration", start: 2, end: 4, q: ["Which high-volume, low-value processes should be automated first?", "What\u2019s the business case \u2014 labor savings, speed, error reduction, or all three?"] },
    { name: "Data governance & reporting", start: 2, end: 4, q: ["Do we trust our data enough to make decisions on it without manual verification?", "If the board asked for a number today, how quickly and confidently could we produce it?"] },
  ]},
  { id: "operations", num: "07", title: "Operations & asset optimization", items: [
    { name: "Operational readiness planning", start: 3, end: 4, q: ["Will operations be genuinely ready on day one, or are we going to scramble?", "Have we tested our operational processes before go-live, not just documented them?"] },
    { name: "Asset management strategy", start: 4, end: 5, q: ["Are we managing assets for maximum lifecycle value, or just keeping them running?", "When does it make more sense to replace than maintain \u2014 and do we have a framework for that call?"] },
    { name: "Energy management, efficiency & resilience", start: 4, end: 4, q: ["What\u2019s our energy cost per unit of output versus peers?", "Are we resilient to grid disruption or price spikes, or is that a blind spot?"] },
    { name: "Financial reporting & accounting", start: 4, end: 4, q: ["Are our reporting processes efficient, or are we throwing people at close cycles?", "Can we report with both confidence and speed when stakeholders need answers?"] },
    { name: "Internal audit & benchmarking", start: 4, end: 4, q: ["Are we benchmarking against the right peers with the right metrics?", "Where do our operations underperform, and do we understand the root cause?"] },
    { name: "Credit substantiation & audit readiness", start: 4, end: 5, q: ["Can we defend every credit we\u2019ve claimed with documentation?", "If audited tomorrow, what would we be scrambling to pull together?"] },
    { name: "Customs & trade compliance", start: 4, end: 5, q: ["Are we managing duty exposure proactively, or finding out about costs at the border?", "Are our foreign trade zone benefits fully realized?"] },
    { name: "Climate risk modeling", start: 4, end: 5, q: ["Have we modeled the physical and transition risks to our assets under multiple scenarios?", "Are we pricing climate risk into investment decisions, or treating it as a future problem?"] },
    { name: "Cybersecurity & crisis response", start: 4, end: 4, q: ["If we were breached today, what\u2019s our response plan and who leads it?", "Are our operational technology systems as protected as our IT systems?"] },
    { name: "Facility operate, maintain & retire", start: 4, end: 5, q: ["Is our maintenance strategy predictive or reactive?", "Are we spending the right amount on maintenance \u2014 not too much, not too little?"] },
    { name: "Decommissioning & disposal", start: 5, end: 5, q: ["Do we know our decommissioning obligations, and are they funded?", "Are there environmental liabilities we haven\u2019t quantified or disclosed?"] },
    { name: "Operational turnaround & restructuring", start: 4, end: 5, q: ["If an asset is underperforming, do we have a playbook to diagnose and fix it fast?", "At what point do we cut losses versus invest in a turnaround \u2014 and who makes that call?"] },
  ]},
];

function Tooltip({ questions, children }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const ref = useRef(null);
  const onEnter = () => {
    const rect = ref.current?.getBoundingClientRect();
    if (rect) setPos({ x: rect.left + rect.width / 2, y: rect.top });
    setShow(true);
  };
  return (
    <span ref={ref} onMouseEnter={onEnter} onMouseLeave={() => setShow(false)} style={{ position: "relative", display: "inline-flex", alignItems: "center" }}>
      {children}
      {show && questions && questions.length > 0 && (
        <span style={{
          position: "fixed", left: Math.min(pos.x - 150, window.innerWidth - 330), top: pos.y - 8,
          transform: "translateY(-100%)", width: 300, padding: "10px 12px",
          backgroundColor: PWC.black, color: PWC.white,
          fontFamily: "Arial, sans-serif", fontSize: 11.5, lineHeight: 1.5,
          borderRadius: 4, boxShadow: "0 4px 16px rgba(0,0,0,0.25)",
          zIndex: 1000, pointerEvents: "none",
        }}>
          <span style={{ color: PWC.orange300, fontWeight: "bold", fontSize: 10, display: "block", marginBottom: 4 }}>Key questions</span>
          <span style={{ display: "block", marginBottom: 4 }}>1. {questions[0]}</span>
          <span style={{ display: "block" }}>2. {questions[1]}</span>
        </span>
      )}
    </span>
  );
}

function PhaseBar({ item, dimmed }) {
  return (
    <div style={{ display: "flex", gap: 1, flex: 1, transition: "opacity 0.3s", opacity: dimmed ? 0.12 : 1 }}>
      {PHASES.map((_, i) => {
        const active = i >= item.start && i <= item.end;
        const isStart = i === item.start;
        const isEnd = i === item.end;
        return (
          <div key={i} style={{ flex: 1, display: "flex", alignItems: "center", height: 10 }}>
            {active ? (
              <div style={{ width: "100%", height: 5, backgroundColor: BAR_COLOR, borderRadius: `${isStart?3:0}px ${isEnd?3:0}px ${isEnd?3:0}px ${isStart?3:0}px`, opacity: 0.85, position: "relative" }}>
                {isStart && <div style={{ position: "absolute", left: -1, top: -1, width: 7, height: 7, borderRadius: 1, backgroundColor: BAR_COLOR, opacity: 0.9 }} />}
                {isEnd && <div style={{ position: "absolute", right: -1, top: -1, width: 7, height: 7, borderRadius: 1, backgroundColor: BAR_COLOR, opacity: 0.9 }} />}
              </div>
            ) : ( <div style={{ width: "100%", height: 1, backgroundColor: PWC.grey300, opacity: 0.35 }} /> )}
          </div>
        );
      })}
    </div>
  );
}

function PhaseBarMini({ item }) {
  return (
    <div style={{ display: "flex", gap: 1, width: 90 }}>
      {PHASES.map((_, i) => {
        const active = i >= item.start && i <= item.end;
        return <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, backgroundColor: active ? PWC.orange : PWC.grey200, opacity: active ? 0.8 : 0.4 }} />;
      })}
    </div>
  );
}

function CategoryRow({ category, isExpanded, onToggle, activePersona, selected, onSelect }) {
  const persona = activePersona ? PERSONAS.find(p => p.id === activePersona) : null;
  const hasAnyMatch = persona ? category.items.some(it => persona.capabilities.has(it.name)) : true;
  const matchCount = persona ? category.items.filter(it => persona.capabilities.has(it.name)).length : 0;
  const selectedInCat = category.items.filter(it => selected.has(`${category.id}::${it.name}`)).length;
  return (
    <div style={{ borderBottom: `1px solid ${PWC.grey200}`, backgroundColor: isExpanded ? PWC.orange50 : "transparent", transition: "background-color 0.25s, opacity 0.3s", opacity: persona && !hasAnyMatch ? 0.3 : 1 }}>
      <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer", userSelect: "none" }}
        onMouseEnter={e => { if (!isExpanded) e.currentTarget.style.backgroundColor = PWC.grey50; }}
        onMouseLeave={e => { if (!isExpanded) e.currentTarget.style.backgroundColor = "transparent"; }}>
        <span style={{ fontFamily: "Georgia, serif", fontSize: 11, color: PWC.orange, minWidth: 18, textAlign: "right" }}>{category.num}</span>
        <div style={{ width: 200, minWidth: 200, display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontFamily: "Arial, sans-serif", fontSize: 12.5, fontWeight: "bold", color: PWC.black, lineHeight: 1.3 }}>{category.title}</span>
          {persona && hasAnyMatch && <span style={{ fontFamily: "Arial, sans-serif", fontSize: 9, padding: "1px 6px", borderRadius: 3, backgroundColor: PWC.orange100, color: PWC.black, fontWeight: "bold", whiteSpace: "nowrap", flexShrink: 0 }}>{matchCount}</span>}
          {selectedInCat > 0 && !persona && <span style={{ fontFamily: "Arial, sans-serif", fontSize: 9, padding: "1px 6px", borderRadius: 3, backgroundColor: PWC.orange, color: PWC.white, fontWeight: "bold", whiteSpace: "nowrap", flexShrink: 0 }}>{selectedInCat}</span>}
        </div>
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {PHASES.map((_, i) => {
            const rel = persona ? category.items.filter(it => persona.capabilities.has(it.name)) : category.items;
            const active = rel.some(it => i>=it.start && i<=it.end);
            return <div key={i} style={{ flex: 1, height: 8, borderRadius: 2, backgroundColor: active ? BAR_COLOR : PWC.grey100, opacity: active ? 0.5 : 0.3, transition: "all 0.3s" }} />;
          })}
        </div>
        <svg width="14" height="14" viewBox="0 0 14 14" style={{ transform: isExpanded?"rotate(180deg)":"rotate(0deg)", transition: "transform 0.25s", flexShrink: 0, opacity: 0.4 }}>
          <path d="M3.5 5.5L7 9L10.5 5.5" fill="none" stroke={PWC.black} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <div style={{ maxHeight: isExpanded ? category.items.length*36+16 : 0, overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 12px 10px" }}>
          {category.items.map((item, i) => {
            const dimmed = persona && !persona.capabilities.has(item.name);
            const key = `${category.id}::${item.name}`;
            const isSel = selected.has(key);
            return (
              <div key={i} onClick={e => { e.stopPropagation(); onSelect(key, category.title, item); }}
                style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", borderRadius: 3, margin: "0 -4px", padding: "4px 4px", backgroundColor: isSel ? PWC.orange50 : "transparent", transition: "background-color 0.15s" }}
                onMouseEnter={e => { if (!isSel) e.currentTarget.style.backgroundColor = PWC.grey50; }}
                onMouseLeave={e => { if (!isSel) e.currentTarget.style.backgroundColor = isSel ? PWC.orange50 : "transparent"; }}>
                <span style={{ minWidth: 18, display: "flex", justifyContent: "center" }}>
                  <span style={{ width: 14, height: 14, borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center", border: isSel ? `2px solid ${PWC.orange}` : `1.5px solid ${PWC.grey300}`, backgroundColor: isSel ? PWC.orange : "transparent", transition: "all 0.15s" }}>
                    {isSel && <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2.5 5L4.5 7L7.5 3" fill="none" stroke={PWC.white} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                  </span>
                </span>
                <Tooltip questions={item.q}>
                  <div style={{ width: 200, minWidth: 200, fontFamily: "Arial, sans-serif", fontSize: 11.5, color: PWC.black, lineHeight: 1.3, transition: "opacity 0.3s", opacity: dimmed ? 0.18 : 1, fontWeight: isSel ? "bold" : "normal", borderBottom: `1px dashed ${PWC.grey300}`, paddingBottom: 1 }}>{item.name}</div>
                </Tooltip>
                <PhaseBar item={item} dimmed={dimmed} />
                <span style={{ width: 14, flexShrink: 0 }} />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [expanded, setExpanded] = useState(null);
  const [allExpanded, setAllExpanded] = useState(false);
  const [activePersona, setActivePersona] = useState(null);
  const [selected, setSelected] = useState(new Map());
  const [copied, setCopied] = useState(false);
  const toggle = id => { if (allExpanded) return; setExpanded(expanded===id?null:id); };
  const toggleAll = () => { setAllExpanded(!allExpanded); if (!allExpanded) setExpanded(null); };
  const activeP = activePersona ? PERSONAS.find(p => p.id === activePersona) : null;
  const onSelect = useCallback((key, catTitle, item) => {
    setSelected(prev => {
      const next = new Map(prev);
      if (next.has(key)) next.delete(key);
      else next.set(key, { catTitle, name: item.name, phases: PHASES.slice(item.start, item.end + 1).map(p => p.label), note: "" });
      return next;
    });
  }, []);
  const updateNote = useCallback((key, note) => {
    setSelected(prev => {
      const next = new Map(prev);
      const e = next.get(key);
      if (e) next.set(key, { ...e, note });
      return next;
    });
  }, []);
  const clearAll = () => setSelected(new Map());
  const copyToClipboard = () => {
    const g = {};
    selected.forEach(v => {
      if (!g[v.catTitle]) g[v.catTitle] = [];
      g[v.catTitle].push(v.note ? `${v.name} (${v.phases.join(", ")})\n    Note: ${v.note}` : `${v.name} (${v.phases.join(", ")})`);
    });
    const text = Object.entries(g).map(([c, items]) => `${c}\n${items.map(i => `  - ${i}`).join("\n")}`).join("\n\n");
    navigator.clipboard.writeText(`PwC Infrastructure Capabilities - Selected Services\n${"=".repeat(50)}\n\n${text}`).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  const selectedKeys = new Set(selected.keys());
  const grouped = {};
  selected.forEach((v, k) => { if (!grouped[v.catTitle]) grouped[v.catTitle] = []; grouped[v.catTitle].push({ ...v, key: k }); });

  return (
    <div style={{ padding: "4px 0", maxWidth: 740, margin: "0 auto", fontFamily: "Arial, sans-serif" }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontFamily: "Georgia, serif", fontSize: 22, fontWeight: "bold", color: PWC.black, lineHeight: 1.2 }}>One infrastructure capability assessment</div>
        <div style={{ fontFamily: "Arial, sans-serif", fontSize: 13, color: PWC.grey500, marginTop: 4 }}>Owner perspective</div>
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontFamily: "Arial, sans-serif", fontSize: 11, fontWeight: "bold", color: PWC.black, textTransform: "uppercase", letterSpacing: "0.4px", marginBottom: 8 }}>Filter by role</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {PERSONAS.map(p => {
            const isA = activePersona===p.id;
            return <button key={p.id} onClick={() => setActivePersona(isA?null:p.id)} style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", padding: "8px 12px", borderRadius: 4, border: isA ? `2px solid ${PWC.orange}` : `1px solid ${PWC.grey300}`, background: isA ? PWC.orange50 : PWC.white, cursor: "pointer", fontFamily: "Arial, sans-serif", transition: "all 0.2s", flex: "1 1 calc(33.33% - 6px)", minWidth: 155 }}>
              <span style={{ fontSize: 12.5, fontWeight: "bold", color: PWC.black }}>{p.label}</span>
              <span style={{ fontSize: 10.5, color: PWC.grey500, lineHeight: 1.3, marginTop: 2, textAlign: "left" }}>{p.description}</span>
            </button>;
          })}
        </div>
        {activeP && <div style={{ marginTop: 8, fontSize: 12, color: PWC.orange, fontWeight: "bold" }}>Showing {activeP.capabilities.size} capabilities relevant to {activeP.label}</div>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2, padding: "0 12px" }}>
        <span style={{ minWidth: 18 }} /><div style={{ width: 200, minWidth: 200 }} />
        <div style={{ display: "flex", gap: 0, flex: 1 }}>
          {PHASES.map((phase, i) => <div key={phase.id} style={{ flex: 1, textAlign: "center", padding: "8px 0", backgroundColor: ["#FD5108","#F46318","#EB7528","#E28738","#D99948","#D0AB58"][i], color: i < 4 ? PWC.white : PWC.black, fontFamily: "Arial, sans-serif", fontSize: 11, fontWeight: "bold", borderRight: i<PHASES.length-1 ? "1px solid rgba(255,255,255,0.25)" : "none", borderRadius: i===0?"4px 0 0 4px":i===PHASES.length-1?"0 4px 4px 0":0 }}>{phase.label}</div>)}
        </div>
        <span style={{ width: 14 }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 12px", borderBottom: `1px solid ${PWC.grey200}` }}>
        <div style={{ fontSize: 10.5, color: PWC.grey500 }}>{selected.size > 0 ? `${selected.size} selected` : "Hover for key questions \u00b7 Select capabilities to build your summary"}</div>
        <button onClick={toggleAll} style={{ fontFamily: "Arial, sans-serif", fontSize: 10.5, color: PWC.black, background: "none", border: `1px solid ${PWC.grey300}`, borderRadius: 4, padding: "3px 10px", cursor: "pointer" }}>{allExpanded ? "Collapse all" : "Expand all"}</button>
      </div>
      <div style={{ border: `1px solid ${PWC.grey200}`, borderTop: "none", borderRadius: "0 0 4px 4px", overflow: "hidden" }}>
        {CATEGORIES.map(cat => <CategoryRow key={cat.id} category={cat} isExpanded={allExpanded || expanded===cat.id} onToggle={() => toggle(cat.id)} activePersona={activePersona} selected={selectedKeys} onSelect={onSelect} />)}
      </div>
      {selected.size > 0 && (
        <div style={{ marginTop: 16, border: `2px solid ${PWC.orange}`, borderRadius: 4, overflow: "hidden" }}>
          <div style={{ padding: "10px 16px", backgroundColor: PWC.orange, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, fontWeight: "bold", color: PWC.white }}>Your selected capabilities ({selected.size})</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={copyToClipboard} style={{ fontSize: 11, fontWeight: "bold", color: PWC.orange, backgroundColor: PWC.white, border: "none", borderRadius: 4, padding: "4px 12px", cursor: "pointer" }}>{copied ? "Copied" : "Copy to clipboard"}</button>
              <button onClick={clearAll} style={{ fontSize: 11, fontWeight: "bold", color: PWC.white, backgroundColor: "transparent", border: `1px solid ${PWC.white}`, borderRadius: 4, padding: "4px 12px", cursor: "pointer" }}>Clear all</button>
            </div>
          </div>
          <div style={{ padding: "12px 16px", backgroundColor: PWC.white }}>
            {Object.entries(grouped).map(([catTitle, items]) => (
              <div key={catTitle} style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: PWC.black, textTransform: "uppercase", letterSpacing: "0.3px", marginBottom: 4 }}>{catTitle}</div>
                {items.map((item, i) => (
                  <div key={i} style={{ padding: "6px 0", borderBottom: i < items.length - 1 ? `1px solid ${PWC.grey100}` : "none" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 12, color: PWC.black, flex: 1, fontWeight: "bold" }}>{item.name}</span>
                      <PhaseBarMini item={{ start: PHASES.findIndex(p => p.label === item.phases[0]), end: PHASES.findIndex(p => p.label === item.phases[item.phases.length - 1]) }} />
                      <span style={{ fontSize: 10, color: PWC.grey500, minWidth: 80, textAlign: "right" }}>{item.phases.join(" - ")}</span>
                    </div>
                    <input type="text" placeholder="Add a note..." value={item.note || ""} onClick={e => e.stopPropagation()} onChange={e => updateNote(item.key, e.target.value)}
                      style={{ width: "100%", marginTop: 4, padding: "5px 8px", fontSize: 11.5, color: PWC.black, border: `1px solid ${PWC.grey200}`, borderRadius: 3, backgroundColor: PWC.grey50, outline: "none", transition: "border-color 0.15s", fontFamily: "Arial, sans-serif" }}
                      onFocus={e => e.target.style.borderColor = PWC.orange} onBlur={e => e.target.style.borderColor = PWC.grey200} />
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
