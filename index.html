<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infrastructure Capability Assessment</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #4a5568;
      --color-text-tertiary: #8795a1;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f8fa;
      --color-background-tertiary: #edf0f4;
      --color-border-tertiary: #dce1e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      display: flex;
      justify-content: center;
      padding: 24px 12px 40px;
      min-height: 100vh;
    }
    #root { width: 100%; max-width: 820px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const PHASES = [
  { id: "strategy", label: "Strategy", color: "#B85042" },
  { id: "finance", label: "Finance", color: "#C46A3E" },
  { id: "plan", label: "Plan", color: "#D4883A" },
  { id: "build", label: "Build", color: "#3D7A5F" },
  { id: "operate", label: "Operate", color: "#2D6A7A" },
  { id: "dispose", label: "Dispose", color: "#4A5568" },
];

const SCALE_COLOR = "#3D7A5F";
const ENHANCE_COLOR = "#C46A3E";
const EVALUATE_COLOR = "#888";

const CATEGORIES = [
  {
    id: "investment", num: "01", title: "Capital & investment strategy", accent: "#B85042",
    items: [
      { name: "Capital strategy & portfolio planning", start: 0, end: 1, status: "scale" },
      { name: "Business case & feasibility", start: 0, end: 2, status: "scale" },
      { name: "Site selection", start: 0, end: 2, status: "scale" },
      { name: "Investment prioritization", start: 0, end: 1, status: "enhance", isNew: true },
      { name: "Post investment review", start: 4, end: 5, status: "scale" },
    ],
  },
  {
    id: "structuring", num: "02", title: "Structuring, tax & incentives", accent: "#C46A3E",
    items: [
      { name: "Tax credit & incentive strategy", start: 0, end: 5, status: "scale" },
      { name: "Credits, incentives & tax exemptions", start: 0, end: 5, status: "scale", note: "Property tax abatements, sales/use tax exemptions, energy credits, local grants" },
      { name: "Grants & incentives", start: 0, end: 5, status: "scale" },
      { name: "Joint ventures & partnerships", start: 0, end: 3, status: "enhance" },
      { name: "Entity & legal structuring", start: 0, end: 1, status: "scale", isNew: true },
      { name: "REIT & investor-specific tax structuring", start: 0, end: 1, status: "scale", isNew: true, note: "Pension funds, SWFs, retail investors, HNWI/family offices" },
      { name: "Tax optimization & transfer pricing", start: 1, end: 4, status: "scale", isNew: true },
      { name: "Capital program tax advisory", start: 2, end: 4, status: "scale", isNew: true },
      { name: "Cost segregation analysis", start: 2, end: 3, status: "scale", isNew: true, note: "Asset reclassification to accelerate depreciation" },
      { name: "Customs & trade planning", start: 0, end: 2, status: "enhance", note: "Strategic \u2014 operational compliance also in cat 7" },
      { name: "Sustainability-linked tax credits", start: 0, end: 4, status: "enhance", isNew: true, note: "ITC, PTC, energy community credits, domestic content" },
    ],
  },
  {
    id: "financing", num: "03", title: "Financing & transactions", accent: "#D4883A",
    items: [
      { name: "Equity raise & lead advisory", start: 0, end: 1, status: "scale", isNew: true },
      { name: "Debt raise & capital markets", start: 1, end: 2, status: "scale", isNew: true },
      { name: "Financial due diligence", start: 1, end: 1, status: "scale", isNew: true },
      { name: "Tax due diligence", start: 1, end: 1, status: "scale", isNew: true },
      { name: "Commercial due diligence", start: 1, end: 1, status: "scale", isNew: true },
      { name: "Technical due diligence", start: 1, end: 2, status: "evaluate", isNew: true },
      { name: "Valuation", start: 0, end: 1, status: "scale", isNew: true },
      { name: "Market entry & structuring", start: 0, end: 1, status: "scale", isNew: true },
      { name: "Post-deal integration", start: 1, end: 2, status: "enhance", isNew: true },
    ],
  },
  {
    id: "governance", num: "04", title: "Governance, risk & compliance", accent: "#5A7A3D",
    items: [
      { name: "Governance & setup", start: 0, end: 3, status: "scale" },
      { name: "Regulatory strategy", start: 2, end: 3, status: "enhance" },
      { name: "Compliance monitoring", start: 2, end: 5, status: "scale" },
      { name: "Stakeholder management", start: 2, end: 4, status: "enhance" },
      { name: "Organizational design", start: 2, end: 3, status: "scale" },
      { name: "Change management", start: 2, end: 3, status: "scale" },
      { name: "Sustainability & ESG", start: 0, end: 5, status: "scale" },
      { name: "ESG-tax convergence & carbon reporting", start: 2, end: 5, status: "enhance", isNew: true, note: "Aligning tax strategy with sustainability reporting" },
      { name: "Health & safety advisory", start: 2, end: 4, status: "evaluate" },
      { name: "Risk management framework", start: 2, end: 4, status: "scale", isNew: true },
    ],
  },
  {
    id: "delivery", num: "05", title: "Program delivery & controls", accent: "#3D7A5F",
    items: [
      { name: "Program & project management", start: 2, end: 3, status: "scale" },
      { name: "Cost management & controls", start: 2, end: 3, status: "scale" },
      { name: "Schedule & risk management", start: 2, end: 3, status: "scale" },
      { name: "Procurement strategy", start: 2, end: 3, status: "enhance" },
      { name: "Commercial management", start: 2, end: 4, status: "enhance" },
      { name: "Supply chain execution", start: 2, end: 4, status: "enhance" },
      { name: "Construction oversight", start: 3, end: 3, status: "evaluate" },
      { name: "Commissioning & handover", start: 3, end: 4, status: "evaluate" },
      { name: "Design management", start: 2, end: 3, status: "evaluate" },
      { name: "Technical advisory", start: 2, end: 3, status: "evaluate" },
      { name: "Lender & investor technical advisory", start: 1, end: 3, status: "scale", isNew: true },
    ],
  },
  {
    id: "technology", num: "06", title: "Technology & data", accent: "#2D6A7A",
    items: [
      { name: "Digital program enablement", start: 1, end: 4, status: "scale" },
      { name: "Advanced analytics", start: 2, end: 4, status: "scale" },
      { name: "BIM / digital twin", start: 2, end: 4, status: "evaluate", isNew: true },
      { name: "ERP integration", start: 2, end: 4, status: "enhance", isNew: true },
      { name: "Process automation & orchestration", start: 2, end: 4, status: "enhance", isNew: true },
      { name: "Data governance & reporting", start: 2, end: 4, status: "scale", isNew: true },
    ],
  },
  {
    id: "operations", num: "07", title: "Operations & asset optimization", accent: "#4A5568",
    items: [
      { name: "Operational readiness planning", start: 3, end: 4, status: "scale", isNew: true },
      { name: "Asset management strategy", start: 4, end: 5, status: "scale" },
      { name: "Energy management & efficiency", start: 4, end: 4, status: "scale", isNew: true },
      { name: "Energy cost & resilience assessment", start: 4, end: 4, status: "enhance", isNew: true },
      { name: "Financial reporting & accounting", start: 4, end: 4, status: "scale", isNew: true },
      { name: "Internal audit & benchmarking", start: 4, end: 4, status: "scale", isNew: true },
      { name: "Credit substantiation & audit readiness", start: 4, end: 5, status: "scale", isNew: true, note: "Ongoing data capture to defend credits and incentives" },
      { name: "Customs & trade compliance", start: 4, end: 5, status: "enhance", isNew: true, note: "Duty exposure, FTZ benefits, tariff management" },
      { name: "Cybersecurity & crisis response", start: 4, end: 4, status: "enhance", isNew: true },
      { name: "Facility operate, maintain & retire", start: 4, end: 5, status: "scale", isNew: true },
      { name: "Decommissioning & disposal", start: 5, end: 5, status: "scale", isNew: true },
      { name: "Crisis & turnaround", start: 4, end: 5, status: "enhance" },
    ],
  },
];

function PhaseBar({ item }) {
  const color = item.status === "scale" ? SCALE_COLOR : item.status === "enhance" ? ENHANCE_COLOR : EVALUATE_COLOR;
  const isDashed = item.status === "evaluate";
  return (
    <div style={{ display: "flex", gap: 1, flex: 1 }}>
      {PHASES.map((_, i) => {
        const active = i >= item.start && i <= item.end;
        const isStart = i === item.start;
        const isEnd = i === item.end;
        return (
          <div key={i} style={{ flex: 1, display: "flex", alignItems: "center", height: 10 }}>
            {active ? (
              <div style={{
                width: "100%", height: isDashed ? 3 : 5,
                backgroundColor: isDashed ? "transparent" : color,
                borderTop: isDashed ? `2px dashed ${color}` : "none",
                borderRadius: `${isStart ? 3 : 0}px ${isEnd ? 3 : 0}px ${isEnd ? 3 : 0}px ${isStart ? 3 : 0}px`,
                opacity: 0.8, position: "relative",
              }}>
                {isStart && <div style={{ position: "absolute", left: -1, top: isDashed ? -4 : -1, width: 7, height: 7, borderRadius: 1, backgroundColor: color, opacity: 0.9 }} />}
                {isEnd && <div style={{ position: "absolute", right: -1, top: isDashed ? -4 : -1, width: 7, height: 7, borderRadius: 1, backgroundColor: color, opacity: 0.9 }} />}
              </div>
            ) : (
              <div style={{ width: "100%", height: 1, backgroundColor: "#dce1e8", opacity: 0.3 }} />
            )}
          </div>
        );
      })}
    </div>
  );
}

function CategoryRow({ category, isExpanded, onToggle }) {
  const newCount = category.items.filter((i) => i.isNew).length;
  return (
    <div style={{
      borderBottom: "1px solid #dce1e8",
      backgroundColor: isExpanded ? `${category.accent}06` : "transparent",
      transition: "background-color 0.25s",
    }}>
      <div onClick={onToggle} style={{
        display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer", userSelect: "none",
      }}
        onMouseEnter={(e) => { if (!isExpanded) e.currentTarget.style.backgroundColor = `${category.accent}08`; }}
        onMouseLeave={(e) => { if (!isExpanded) e.currentTarget.style.backgroundColor = "transparent"; }}
      >
        <span style={{ fontFamily: "Georgia, serif", fontSize: 11, color: category.accent, opacity: 0.6, minWidth: 18, textAlign: "right" }}>{category.num}</span>
        <div style={{ width: 200, minWidth: 200, display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 12.5, fontWeight: 500, color: "#1a1a2e", lineHeight: 1.3 }}>{category.title}</span>
          {newCount > 0 && (
            <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, backgroundColor: `${category.accent}15`, color: category.accent, fontWeight: 500, whiteSpace: "nowrap", flexShrink: 0 }}>+{newCount}</span>
          )}
        </div>
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {PHASES.map((_, i) => {
            const hasScale = category.items.some((it) => it.status === "scale" && i >= it.start && i <= it.end);
            const hasEnhance = category.items.some((it) => it.status === "enhance" && i >= it.start && i <= it.end);
            const hasEval = category.items.some((it) => it.status === "evaluate" && i >= it.start && i <= it.end);
            const active = hasScale || hasEnhance || hasEval;
            const c = hasScale ? SCALE_COLOR : hasEnhance ? ENHANCE_COLOR : EVALUATE_COLOR;
            return (
              <div key={i} style={{
                flex: 1, height: 8, borderRadius: 2,
                backgroundColor: active ? c : "#edf0f4",
                opacity: active ? 0.55 : 0.2, transition: "opacity 0.2s",
              }} />
            );
          })}
        </div>
        <span style={{ fontSize: 10, color: "#8795a1", minWidth: 16, textAlign: "center" }}>{category.items.length}</span>
        <svg width="14" height="14" viewBox="0 0 14 14" style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s", flexShrink: 0, opacity: 0.35 }}>
          <path d="M3.5 5.5L7 9L10.5 5.5" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <div style={{ maxHeight: isExpanded ? category.items.length * 34 + 20 : 0, overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 12px 10px" }}>
          {category.items.map((item, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "3px 0" }}>
              <span style={{ minWidth: 18 }} />
              <div style={{ width: 200, minWidth: 200, fontSize: 11.5, color: "#1a1a2e", lineHeight: 1.3, display: "flex", alignItems: "flex-start", gap: 5 }}>
                {item.isNew && <span style={{ width: 5, height: 5, borderRadius: 3, backgroundColor: category.accent, flexShrink: 0, marginTop: 4 }} />}
                <span style={{ opacity: item.isNew ? 1 : 0.85 }}>
                  {item.name}
                  {item.note && (
                    <span style={{ fontSize: 10, color: "#8795a1", fontStyle: "italic", marginLeft: 4 }}>
                      &mdash; {item.note}
                    </span>
                  )}
                </span>
              </div>
              <PhaseBar item={item} />
              <span style={{ minWidth: 16 }} />
              <span style={{ width: 14, flexShrink: 0 }} />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CapabilityAssessment() {
  const [expanded, setExpanded] = useState(null);
  const [allExpanded, setAllExpanded] = useState(false);
  const toggle = (id) => { if (allExpanded) return; setExpanded(expanded === id ? null : id); };
  const toggleAll = () => { setAllExpanded(!allExpanded); if (!allExpanded) setExpanded(null); };

  const totalItems = CATEGORIES.reduce((sum, c) => sum + c.items.length, 0);
  const newItems = CATEGORIES.reduce((sum, c) => sum + c.items.filter((i) => i.isNew).length, 0);

  return (
    <div style={{ padding: "4px 0", maxWidth: 780, margin: "0 auto" }}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: "#8795a1", marginBottom: 2, fontStyle: "italic" }}>3/24 Updated &middot; Validated against PwC data center tax article</div>
        <div style={{ fontSize: 18, fontWeight: 500, color: "#1a1a2e", lineHeight: 1.3 }}>Infrastructure capability assessment</div>
        <div style={{ fontSize: 12, color: "#8795a1", marginTop: 2 }}>
          Owner perspective &middot; {totalItems} capabilities across 7 categories &middot; {newItems} added from transcripts, Board deck &amp; tax TL
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2, padding: "0 12px" }}>
        <span style={{ minWidth: 18 }} />
        <div style={{ width: 200, minWidth: 200 }} />
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {PHASES.map((phase, i) => (
            <div key={phase.id} style={{
              flex: 1, textAlign: "center", padding: "7px 0", backgroundColor: phase.color, color: "#fff",
              fontSize: 11, fontWeight: 500,
              borderRadius: i === 0 ? "4px 0 0 4px" : i === PHASES.length - 1 ? "0 4px 4px 0" : 0,
              letterSpacing: "0.2px",
            }}>{phase.label}</div>
          ))}
        </div>
        <span style={{ minWidth: 16, fontSize: 9, color: "#8795a1", textAlign: "center" }}>#</span>
        <span style={{ width: 14 }} />
      </div>

      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "6px 12px", borderBottom: "1px solid #dce1e8",
      }}>
        <div style={{ display: "flex", gap: 14, fontSize: 10.5, color: "#8795a1", alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 14, height: 4, borderRadius: 2, backgroundColor: SCALE_COLOR, opacity: 0.7, display: "inline-block" }} /> Scale
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 14, height: 4, borderRadius: 2, backgroundColor: ENHANCE_COLOR, opacity: 0.7, display: "inline-block" }} /> Enhance / scale
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 14, height: 2, borderTop: `2px dashed ${EVALUATE_COLOR}`, display: "inline-block" }} /> Evaluate
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 5, height: 5, borderRadius: 3, backgroundColor: "#4a5568", display: "inline-block" }} /> New
          </span>
        </div>
        <button onClick={toggleAll} style={{
          fontSize: 10.5, color: "#4a5568", background: "none", border: "1px solid #dce1e8",
          borderRadius: 5, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit",
        }}>{allExpanded ? "Collapse all" : "Expand all"}</button>
      </div>

      <div style={{ border: "1px solid #dce1e8", borderTop: "none", borderRadius: "0 0 8px 8px", overflow: "hidden" }}>
        {CATEGORIES.map((cat) => (
          <CategoryRow key={cat.id} category={cat} isExpanded={allExpanded || expanded === cat.id} onToggle={() => toggle(cat.id)} />
        ))}
      </div>

      <div style={{ marginTop: 10, padding: "10px 14px", backgroundColor: "#f7f8fa", borderRadius: 6, fontSize: 10.5, color: "#8795a1", lineHeight: 1.7 }}>
        <span style={{ fontWeight: 500, color: "#4a5568" }}>Sources:</span> Partner interviews (Daryl, Tiffany, Tom, Kyle, Matt) &middot; CP&amp;I Priorities Board deck &middot; Global credential pack &middot; PwC data center tax strategy article (3/2026)
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CapabilityAssessment />);
  </script>
</body>
</html>
