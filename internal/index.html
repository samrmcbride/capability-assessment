/* ============================================================
   GITHUB PERSISTENCE
   ============================================================ */
const GH_OWNER = "sam-mcbride";
const GH_REPO = "PwC-Infrastructure-Capability-Framework";
const BASE=window.location.pathname.replace(/\/?internal\/?$/,"").replace(/\/?index\.html$/,"").replace(/\/$/,"");
const fwUrl=p=>`${BASE}/data/${p}`;

function getToken() { return localStorage.getItem("gh_cap_token") || null; }
function setToken(t) { localStorage.setItem("gh_cap_token", t); }
function clearToken() { localStorage.removeItem("gh_cap_token"); }

async function ghRead(path, token) {
  try {
    const headers = { Accept: "application/vnd.github.v3+json" };
    if (token) headers.Authorization = `Bearer ${token}`;
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { headers });
    if (!res.ok) return null;
    const json = await res.json();
    return { content: JSON.parse(atob(json.content)), sha: json.sha };
  } catch { return null; }
}

let saveTimers = {};
function ghWriteDebounced(path, data, sha, setSha, token, onStatus) {
  if (!token) return;
  if (saveTimers[path]) clearTimeout(saveTimers[path]);
  saveTimers[path] = setTimeout(async () => {
    try {
      onStatus("Saving...");
      const body = {
        message: `Update ${path}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      };
      if (sha) body.sha = sha;
      const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        const json = await res.json();
        setSha(json.content.sha);
        onStatus("Saved");
        setTimeout(() => onStatus(""), 2500);
      } else {
        onStatus("Save failed");
        setTimeout(() => onStatus(""), 3000);
      }
    } catch (e) { console.error("Save failed:", e); onStatus("Save failed"); setTimeout(() => onStatus(""), 3000); }
  }, 2000);
}

function TokenModal({onSubmit,onViewOnly}){
  const[val,setVal]=useState("");
  const[error,setError]=useState("");
  const trySubmit=async()=>{
    if(!val.trim()){setError("Please enter a token");return;}
    setError("Verifying...");
    try{
      const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{Authorization:`Bearer ${val.trim()}`}});
      if(res.ok){setToken(val.trim());onSubmit(val.trim());}
      else{setError("Invalid token or insufficient permissions. Check that the token has Contents read/write access to this repo.");}
    }catch{setError("Could not reach GitHub. Check your network connection.");}
  };

    React.createElement("div",{className:"modal-box"},

      error&&React.createElement("div",{style:{fontSize:11,color:error==="Verifying..."?PWC.blue:"#DC2626",marginBottom:8}},error),
