    view==="investor"&&React.createElement(AssessmentView,{title:"One infrastructure capability assessment",subtitle:"Investor perspective",personas:INVESTOR_PERSONAS,phases:INVESTOR_PHASES,phaseColors:investorColors,categories:INVESTOR_DATA,showRisk:false}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
